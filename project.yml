# XcodeGen config. Generates WiseRate.xcodeproj from the WiseRate/ source tree.
# Install: brew install xcodegen   |   Generate: xcodegen generate
name: WiseRate
options:
  bundleIdPrefix: app.wiserate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  WiseRate:
    type: application
    platform: iOS
    sources:
      - WiseRate
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.wiserate.WiseRate
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WiseRate:
    build:
      targets:
        WiseRate: all
    run:
      config: Debug
      # Lets you test purchases in the simulator without App Store Connect / sandbox.
      storeKitConfiguration: WiseRate/Resources/Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
