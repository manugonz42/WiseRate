          font-size: 1100px;

        }
        #m2-stage {
          position: absolute;
          left: 1140px;

        }
        #m2-sway {
          position: absolute;
          left: 48px;

        }
        #m2-phone {
          position: absolute;
          inset: 0;
          border-radius: 64px;
          background: #0c0f07;
          border: 2px solid #3a4527;
          box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55);
        }
        #m2-screen {
          position: absolute;
          inset: 12px;
          border-radius: 52px;
          overflow: hidden;
          background: #f2f6e4;
        }
        #m2-img {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          display: block;
        }
        #m2-copy {
          position: absolute;
          left: 110px;
          top: 0;
          height: 100%;
          width: 950px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 30px;
        }
        #m2-caption-mask {
          overflow: hidden;
          border-radius: 14px;
          align-self: flex-start;
        }
        #m2-caption {
          color: #f2f6e4;
          font-size: 60px;
          font-weight: 800;
          letter-spacing: -0.02em;
          line-height: 1.1;
          max-width: 820px;
        }
        #m2-chip {
          align-self: flex-start;
          color: #a9bd82;
          font-size: 32px;
          font-weight: 500;
          letter-spacing: 0.01em;
          opacity: 0;
        }
      </style>

      <div data-hf-id="hf-j82o" id="root" data-composition-id="m2-live-quotes" data-width="1920" data-height="1080" data-duration="6.5">
        <div data-hf-id="hf-hvn8" id="m2-bg"></div>
        <div data-hf-id="hf-ask8" id="m2-watermark">₱</div>
        <div data-hf-id="hf-egs6" id="m2-copy">
          <div data-hf-id="hf-9wim" id="m2-caption-mask"><div data-hf-id="hf-sb26" id="m2-caption">Live quotes from real providers</div></div>
          <div data-hf-id="hf-jxpc" id="m2-chip">€500 → ₱ · 14 providers, refreshed every minute</div>
        </div>
        <div data-hf-id="hf-vhmd" id="m2-stage">
          <div data-hf-id="hf-0qxp" id="m2-sway">
            <div data-hf-id="hf-d5ir" id="m2-phone">
              <div data-hf-id="hf-a8l9" id="m2-screen">
                <img data-hf-id="hf-vb5f" id="m2-img" src="capture/screenshots/mobile/home-full.png" alt="">
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Watermark drift.
          tl.fromTo("#m2-watermark", { x: 0, y: 0 }, { x: 60, y: -40, duration: 6.5, ease: "none" }, 0);

          // Phone rises in — snappy.
          tl.fromTo(
            "#m2-phone",
            { y: 90, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
            0,
          );

          // Gentle 3D sway for the whole beat (finite yoyo, quicker period).
          tl.fromTo(
            "#m2-sway",
            { rotationY: -5 },
            { rotationY: 5, duration: 1.6, ease: "sine.inOut", yoyo: true, repeat: 3 },
            0.3,
          );
          // Slight roll on a different period so the motion feels organic.
          tl.fromTo(
            "#m2-phone",
            { rotationZ: -0.7 },
            { rotationZ: 0.7, duration: 2.05, ease: "sine.inOut", yoyo: true, repeat: 2 },
            0.3,
          );

          // The page scrolls from the hero down to the podium + CTA.
          tl.fromTo("#m2-img", { y: 0 }, { y: -256, duration: 4.0, ease: "power2.inOut" }, 0.9);

          // Caption + chip on the left.
          tl.fromTo("#m2-caption", { x: "-105%" }, { x: "0%", duration: 0.5, ease: "power3.out" }, 0.7);
          tl.fromTo("#m2-chip", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 2.0);

          window.__timelines["m2-live-quotes"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
