<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #m2-bg {
          position: absolute;
          inset: 0;
          background: #1e2a12;
        }
        #m2-watermark {
          position: absolute;
          left: -140px;
          bottom: -320px;
          font-size: 1100px;
          font-weight: 800;
          line-height: 1;
          color: #f2f6e4;
          opacity: 0.04;
        }
        #m2-stage {
          position: absolute;
          left: 1140px;
          top: 105px;
          width: 500px;
          height: 870px;
          perspective: 1600px;
        }
        #m2-sway {
          position: absolute;
          left: 48px;
          top: 0;
          width: 404px;
          height: 870px;
        }
        #m2-phone {
          position: absolute;
          inset: 0;
          border-radius: 64px;
          background: #0c0f07;
          border: 2px solid #3a4527;
          box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55);
        }
        #m2-screen {
          position: absolute;
          inset: 12px;
          border-radius: 52px;
          overflow: hidden;
          background: #f2f6e4;
        }
        #m2-img {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          display: block;
        }
        #m2-copy {
          position: absolute;
          left: 110px;
          top: 0;
          height: 100%;
          width: 950px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 30px;
        }
        #m2-caption-mask {
          overflow: hidden;
          border-radius: 14px;
          align-self: flex-start;
        }
        #m2-caption {
          background: #f2f6e4;
          color: #1e2a12;
          font-size: 50px;
          font-weight: 700;
          letter-spacing: -0.01em;
          padding: 24px 40px;
          border-radius: 14px;
          box-shadow: 0 6px 0 #7ba428;
          max-width: 820px;
        }
        #m2-chip {
          align-self: flex-start;
          background: #1e2a12;
          color: #c6e84e;
          border: 2px solid rgba(198, 232, 78, 0.4);
          font-size: 32px;
          font-weight: 600;
          padding: 16px 28px;
          border-radius: 14px;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="m2-live-quotes" data-width="1920" data-height="1080" data-duration="10">
        <div id="m2-bg"></div>
        <div id="m2-watermark">₱</div>
        <div id="m2-copy">
          <div id="m2-caption-mask"><div id="m2-caption">Live quotes from real providers</div></div>
          <div id="m2-chip">€500 → ₱ · 13 providers, refreshed every minute</div>
        </div>
        <div id="m2-stage">
          <div id="m2-sway">
            <div id="m2-phone">
              <div id="m2-screen">
                <img id="m2-img" src="capture/screenshots/mobile/home-full.png" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Watermark drift.
          tl.fromTo("#m2-watermark", { x: 0, y: 0 }, { x: 60, y: -40, duration: 10, ease: "none" }, 0);

          // Phone rises in.
          tl.fromTo(
            "#m2-phone",
            { y: 90, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.9, ease: "power3.out" },
            0,
          );

          // Gentle 3D sway for the whole beat (finite yoyo).
          tl.fromTo(
            "#m2-sway",
            { rotationY: -5 },
            { rotationY: 5, duration: 2.4, ease: "sine.inOut", yoyo: true, repeat: 3 },
            0.4,
          );
          // Slight roll on a different period so the motion feels organic.
          tl.fromTo(
            "#m2-phone",
            { rotationZ: -0.7 },
            { rotationZ: 0.7, duration: 3.2, ease: "sine.inOut", yoyo: true, repeat: 2 },
            0.4,
          );

          // The page scrolls from the hero down to the podium + CTA.
          tl.fromTo("#m2-img", { y: 0 }, { y: -256, duration: 5.4, ease: "power1.inOut" }, 1.6);

          // Caption + chip on the left.
          tl.fromTo("#m2-caption", { x: "-105%" }, { x: "0%", duration: 0.65, ease: "power3.out" }, 1.2);
          tl.fromTo("#m2-chip", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 3.0);

          window.__timelines["m2-live-quotes"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
