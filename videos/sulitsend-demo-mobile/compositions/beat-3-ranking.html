      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          tl.fromTo("#m3-ring-deco", { x: 0, y: 0 }, { x: 50, y: 40, duration: 7, ease: "none" }, 0);

          // Phone is already in place (continuity with beat 2 — reads as in-app navigation).

          tl.fromTo(
            "#m3-sway",
            { rotationY: -5 },
            { rotationY: 5, duration: 1.75, ease: "sine.inOut", yoyo: true, repeat: 3 },
            0,
          );
          tl.fromTo(
            "#m3-phone",
            { rotationZ: 0.7 },
            { rotationZ: -0.7, duration: 2.33, ease: "sine.inOut", yoyo: true, repeat: 2 },
            0,
          );

          // Fast scroll down the full ranking (BEST DEAL row first, then the rest).
          tl.fromTo("#m3-img", { y: 0 }, { y: -1405, duration: 5.4, ease: "power2.inOut" }, 1.1);

          tl.fromTo("#m3-caption", { x: "-105%" }, { x: "0%", duration: 0.5, ease: "power3.out" }, 0.7);
          tl.fromTo("#m3-chip", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 2.3);

          window.__timelines["m3-ranking"] = tl;
        })();
