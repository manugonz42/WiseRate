<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #m4-bg {
          position: absolute;
          inset: 0;
          background: #1e2a12;
        }
        #m4-watermark {
          position: absolute;
          right: -180px;
          top: -300px;
          font-size: 1000px;
          font-weight: 800;
          line-height: 1;
          color: #f2f6e4;
          opacity: 0.04;
        }
        #m4-stage {
          position: absolute;
          left: 1140px;
          top: 105px;
          width: 500px;
          height: 870px;
          perspective: 1600px;
        }
        #m4-sway {
          position: absolute;
          left: 48px;
          top: 0;
          width: 404px;
          height: 870px;
        }
        #m4-phone {
          position: absolute;
          inset: 0;
          border-radius: 64px;
          background: #0c0f07;
          border: 2px solid #3a4527;
          box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55);
        }
        #m4-screen {
          position: absolute;
          inset: 12px;
          border-radius: 52px;
          overflow: hidden;
          background: #f2f6e4;
        }
        #m4-img {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          display: block;
        }
        #m4-copy {
          position: absolute;
          left: 110px;
          top: 0;
          height: 100%;
          width: 950px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 30px;
        }
        #m4-caption-mask {
          overflow: hidden;
          border-radius: 14px;
          align-self: flex-start;
        }
        #m4-caption {
          background: #f2f6e4;
          color: #1e2a12;
          font-size: 50px;
          font-weight: 700;
          letter-spacing: -0.01em;
          padding: 24px 40px;
          border-radius: 14px;
          box-shadow: 0 6px 0 #7ba428;
          max-width: 820px;
        }
        #m4-chip {
          align-self: flex-start;
          background: #1e2a12;
          color: #c6e84e;
          border: 2px solid rgba(198, 232, 78, 0.4);
          font-size: 32px;
          font-weight: 600;
          padding: 16px 28px;
          border-radius: 14px;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="m4-provider" data-width="1920" data-height="1080" data-duration="11">
        <div id="m4-bg"></div>
        <div id="m4-watermark">₱</div>
        <div id="m4-copy">
          <div id="m4-caption-mask"><div id="m4-caption">Rate history and provider reviews</div></div>
          <div id="m4-chip">Live EUR→PHP trend, 7D–1Y</div>
        </div>
        <div id="m4-stage">
          <div id="m4-sway">
            <div id="m4-phone">
              <div id="m4-screen">
                <img id="m4-img" src="capture/screenshots/mobile/provider-wise-full.png" alt="" />
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          tl.fromTo("#m4-watermark", { x: 0, y: 0 }, { x: -50, y: 40, duration: 11, ease: "none" }, 0);

          // Phone already in place; sway phase continues from beat 3's exit (-5 / -0.7).
          tl.fromTo(
            "#m4-sway",
            { rotationY: -5 },
            { rotationY: 5, duration: 2.75, ease: "sine.inOut", yoyo: true, repeat: 3 },
            0,
          );
          tl.fromTo(
            "#m4-phone",
            { rotationZ: -0.7 },
            { rotationZ: 0.7, duration: 3.67, ease: "sine.inOut", yoyo: true, repeat: 2 },
            0,
          );

          // Scroll from the Wise header + live quote all the way to the rate-history chart.
          tl.fromTo("#m4-img", { y: 0 }, { y: -998, duration: 8.6, ease: "power1.inOut" }, 1.5);

          tl.fromTo("#m4-caption", { x: "-105%" }, { x: "0%", duration: 0.65, ease: "power3.out" }, 1.0);
          tl.fromTo("#m4-chip", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 6.5);

          window.__timelines["m4-provider"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
