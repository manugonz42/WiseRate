<!DOCTYPE html>
<html>
  <head>

  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #m4-bg {
          position: absolute;
          inset: 0;
          background: #1e2a12;
        }
        #m4-watermark {
          position: absolute;
          right: -180px;
          top: -300px;
          font-size: 1000px;
          font-weight: 800;
          line-height: 1;
          color: #f2f6e4;
          opacity: 0.04;
        }
        #m4-stage {
          position: absolute;
          left: 1140px;
          top: 105px;
          width: 500px;
          height: 870px;
          perspective: 1600px;
        }
        #m4-sway {
          position: absolute;
          left: 48px;
          top: 0;
          width: 404px;
          height: 870px;
        }
        #m4-phone {
          position: absolute;
          inset: 0;
          border-radius: 64px;
          background: #0c0f07;
          border: 2px solid #3a4527;
          box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55);
        }
        #m4-screen {
          position: absolute;
          inset: 12px;
          border-radius: 52px;
          overflow: hidden;
          background: #f2f6e4;
        }
        #m4-img {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          display: block;
        }
        #m4-copy {
          position: absolute;
          left: 110px;
          top: 0;
          height: 100%;
          width: 950px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 30px;
        }
        #m4-caption-mask {
          overflow: hidden;
          border-radius: 14px;
          align-self: flex-start;
        }
        #m4-caption {
          color: #f2f6e4;
          font-size: 60px;
          font-weight: 800;
          letter-spacing: -0.02em;
          line-height: 1.1;
          max-width: 820px;
        }
        #m4-chip {
          align-self: flex-start;
          color: #a9bd82;
          font-size: 32px;
          font-weight: 500;
          letter-spacing: 0.01em;
          opacity: 0;
        }
      </style>

      <div data-hf-id="hf-yr4k" id="root" data-composition-id="m4-provider" data-width="1920" data-height="1080" data-duration="7">
        <div data-hf-id="hf-4kny" id="m4-bg"></div>
        <div data-hf-id="hf-8gyq" id="m4-watermark">₱</div>
        <div data-hf-id="hf-zpeg" id="m4-copy">
          <div data-hf-id="hf-0lpw" id="m4-caption-mask"><div data-hf-id="hf-dvqs" id="m4-caption">Rate history and provider reviews</div></div>
          <div data-hf-id="hf-uhv4" id="m4-chip">Live EUR→PHP trend, 7D–1Y</div>
        </div>
        <div data-hf-id="hf-raxf" id="m4-stage">
          <div data-hf-id="hf-iuf3" id="m4-sway">
            <div data-hf-id="hf-ruop" id="m4-phone">
              <div data-hf-id="hf-go3r" id="m4-screen">
                <img data-hf-id="hf-uwpk" id="m4-img" src="capture/screenshots/mobile/provider-wise-full.png" alt="">
              </div>
            </div>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          tl.fromTo("#m4-watermark", { x: 0, y: 0 }, { x: -50, y: 40, duration: 7, ease: "none" }, 0);

          // Phone already in place; sway phase continues from beat 3's exit (-5 / -0.7).
          tl.fromTo(
            "#m4-sway",
            { rotationY: -5 },
            { rotationY: 5, duration: 1.75, ease: "sine.inOut", yoyo: true, repeat: 3 },
            0,
          );
          tl.fromTo(
            "#m4-phone",
            { rotationZ: -0.7 },
            { rotationZ: 0.7, duration: 2.33, ease: "sine.inOut", yoyo: true, repeat: 2 },
            0,
          );

          // Fast scroll from the Wise header + live quote to the rate-history chart.
          tl.fromTo("#m4-img", { y: 0 }, { y: -998, duration: 5.4, ease: "power2.inOut" }, 1.1);

          tl.fromTo("#m4-caption", { x: "-105%" }, { x: "0%", duration: 0.5, ease: "power3.out" }, 0.7);
          tl.fromTo("#m4-chip", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.45, ease: "power2.out" }, 2.5);

          window.__timelines["m4-provider"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
