<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SulitSend — mobile walkthrough (phone mockup)</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Outfit";
        src: url("assets/fonts/outfit-latin.woff2") format("woff2");
        font-weight: 100 900;
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC,
          U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215,
          U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Outfit";
        src: url("assets/fonts/outfit-latin-ext.woff2") format("woff2");
        font-weight: 100 900;
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304,
          U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0,
          U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      body {
        margin: 0;
        background: #1e2a12;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        font-family: "Outfit", sans-serif;
      }
      #root > div[data-composition-src] {
        position: absolute;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="root" data-width="1920" data-height="1080" data-start="0" data-duration="52">
      <div
        id="el-m1"
        data-composition-id="m1-opener"
        data-composition-src="compositions/beat-1-opener.html"
        data-start="0"
        data-duration="5"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-m2"
        data-composition-id="m2-live-quotes"
        data-composition-src="compositions/beat-2-live-quotes.html"
        data-start="5"
        data-duration="10"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-m3"
        data-composition-id="m3-ranking"
        data-composition-src="compositions/beat-3-ranking.html"
        data-start="15"
        data-duration="10"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-m4"
        data-composition-id="m4-provider"
        data-composition-src="compositions/beat-4-provider.html"
        data-start="25"
        data-duration="11"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-m5"
        data-composition-id="m5-transparency"
        data-composition-src="compositions/beat-5-transparency.html"
        data-start="36"
        data-duration="10"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <div
        id="el-m6"
        data-composition-id="m6-close"
        data-composition-src="compositions/beat-6-close.html"
        data-start="46"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["root"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
