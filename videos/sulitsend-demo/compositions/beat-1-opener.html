<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #b1-bg {
          position: absolute;
          inset: 0;
          background: #f2f6e4;
        }
        .b1-blob {
          position: absolute;
          border-radius: 50%;
          background: radial-gradient(circle, #e7edd3 0%, rgba(231, 237, 211, 0) 70%);
        }
        #b1-blob-a {
          width: 900px;
          height: 900px;
          left: -260px;
          top: -320px;
        }
        #b1-blob-b {
          width: 1100px;
          height: 1100px;
          right: -380px;
          bottom: -460px;
        }
        #b1-group {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 48px;
        }
        #b1-lockup {
          display: flex;
          align-items: center;
          gap: 28px;
        }
        #b1-tile {
          width: 140px;
          height: 140px;
          display: grid;
          place-items: center;
          border-radius: 24px;
          background: linear-gradient(135deg, #c6e84e, #c8f135);
          box-shadow: 0 8px 0 #1e2a12;
          color: #1e2a12;
          font-size: 84px;
          font-weight: 800;
        }
        #b1-wordmark-mask {
          overflow: hidden;
        }
        #b1-wordmark {
          font-size: 110px;
          font-weight: 800;
          letter-spacing: -0.03em;
          color: #1e2a12;
          line-height: 1;
        }
        #b1-eyebrow {
          font-size: 30px;
          font-weight: 600;
          letter-spacing: 0.12em;
          color: #5d6a45;
          text-transform: uppercase;
        }
        #b1-headline {
          text-align: center;
          font-size: 68px;
          font-weight: 800;
          letter-spacing: -0.02em;
          color: #1e2a12;
          line-height: 1.15;
        }
        .b1-line {
          display: block;
        }
      </style>

      <div id="root" data-composition-id="b1-opener" data-width="1920" data-height="1080" data-duration="5">
        <div id="b1-bg"></div>
        <div class="b1-blob" id="b1-blob-a"></div>
        <div class="b1-blob" id="b1-blob-b"></div>
        <div id="b1-group">
          <div id="b1-lockup">
            <div id="b1-tile">₱</div>
            <div id="b1-wordmark-mask"><div id="b1-wordmark">sulitsend</div></div>
          </div>
          <div id="b1-eyebrow">EUR → PHP · Live comparison</div>
          <div id="b1-headline">
            <span class="b1-line" id="b1-line1">Send money to the Philippines.</span>
            <span class="b1-line" id="b1-line2">Compare before you send.</span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Slow dolly-in on the whole content group across the beat.
          tl.fromTo("#b1-group", { scale: 1.0 }, { scale: 1.06, duration: 5, ease: "power1.inOut" }, 0);

          // Ambient blobs drift in opposite directions.
          tl.fromTo("#b1-blob-a", { x: 0, y: 0 }, { x: 70, y: 40, duration: 5, ease: "none" }, 0);
          tl.fromTo("#b1-blob-b", { x: 0, y: 0 }, { x: -80, y: -50, duration: 5, ease: "none" }, 0);

          // Tile drops in with overshoot; hard shadow lands.
          tl.fromTo(
            "#b1-tile",
            { y: -80, scale: 0.3, opacity: 0, boxShadow: "0 0px 0 #1e2a12" },
            { y: 0, scale: 1, opacity: 1, duration: 0.65, ease: "back.out(1.7)" },
            0.1,
          );
          tl.to("#b1-tile", { boxShadow: "0 8px 0 #1e2a12", duration: 0.3, ease: "power2.out" }, 0.6);

          // Wordmark slides out from under its mask.
          tl.fromTo(
            "#b1-wordmark",
            { x: "-105%" },
            { x: "0%", duration: 0.7, ease: "power3.out" },
            0.55,
          );

          // Eyebrow blur-in.
          tl.fromTo(
            "#b1-eyebrow",
            { opacity: 0, filter: "blur(8px)" },
            { opacity: 1, filter: "blur(0px)", duration: 0.6, ease: "power2.out" },
            1.3,
          );

          // Headline lines fade-up, staggered.
          tl.fromTo(
            "#b1-line1",
            { opacity: 0, y: 26 },
            { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
            1.7,
          );
          tl.fromTo(
            "#b1-line2",
            { opacity: 0, y: 26 },
            { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" },
            1.9,
          );

          // Gentle settle-out at the end of the beat (soft cut into beat 2).
          tl.fromTo(
            "#b1-group",
            { opacity: 1 },
            { opacity: 0, duration: 0.45, ease: "power2.in" },
            4.55,
          );

          window.__timelines["b1-opener"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
