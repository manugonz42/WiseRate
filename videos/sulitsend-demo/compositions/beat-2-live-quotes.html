<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #b2-bg {
          position: absolute;
          inset: 0;
          background: #1e2a12;
        }
        #b2-watermark {
          position: absolute;
          left: -140px;
          bottom: -320px;
          font-size: 1100px;
          font-weight: 800;
          line-height: 1;
          color: #f2f6e4;
          opacity: 0.04;
        }
        #b2-frame {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 1632px;
          height: 918px;
          margin-left: -816px;
          margin-top: -459px;
          border-radius: 18px;
          overflow: hidden;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }
        #b2-cam {
          position: absolute;
          inset: 0;
          transform-origin: 64% 21%;
        }
        #b2-shot {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        #b2-ring {
          position: absolute;
          left: 49.5%;
          top: 11.5%;
          width: 29%;
          height: 17%;
          border: 5px solid #c8f135;
          border-radius: 20px;
          box-shadow: 0 0 40px rgba(200, 241, 53, 0.55);
          opacity: 0;
        }
        #b2-caption-mask {
          position: absolute;
          left: 72px;
          bottom: 150px;
          overflow: hidden;
          border-radius: 14px;
        }
        #b2-caption {
          background: #1e2a12;
          color: #f2f6e4;
          font-size: 44px;
          font-weight: 700;
          letter-spacing: -0.01em;
          padding: 22px 36px;
          border-radius: 14px;
          box-shadow: 0 5px 0 #7ba428;
        }
        #b2-chip {
          position: absolute;
          left: 72px;
          bottom: 72px;
          background: #ffffff;
          color: #1e2a12;
          font-size: 30px;
          font-weight: 600;
          padding: 14px 26px;
          border-radius: 14px;
          box-shadow: 0 4px 0 #7ba428;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="b2-live-quotes" data-width="1920" data-height="1080" data-duration="10">
        <div id="b2-bg"></div>
        <div id="b2-watermark">₱</div>
        <div id="b2-frame">
          <div id="b2-cam">
            <img id="b2-shot" src="capture/screenshots/pages/home.png" alt="" />
            <div id="b2-ring"></div>
          </div>
        </div>
        <div id="b2-caption-mask"><div id="b2-caption">Live quotes from real providers</div></div>
        <div id="b2-chip">€500 → ₱ · 13 providers, refreshed every minute</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Watermark drifts slowly the whole beat.
          tl.fromTo("#b2-watermark", { x: 0, y: 0 }, { x: 60, y: -40, duration: 10, ease: "none" }, 0);

          // Frame rises in and settles.
          tl.fromTo(
            "#b2-frame",
            { opacity: 0, y: 48 },
            { opacity: 1, y: 0, duration: 0.85, ease: "power3.out" },
            0,
          );

          // Camera: continuous dolly-in toward the chartreuse winner card.
          tl.fromTo(
            "#b2-cam",
            { scale: 1.1 },
            { scale: 1.28, duration: 7.2, ease: "power1.inOut" },
            1.4,
          );
          // Keep drifting gently to the end so the frame never sits still.
          tl.to("#b2-cam", { scale: 1.31, duration: 1.4, ease: "power1.out" }, 8.6);

          // Caption bar snaps in from the left mask.
          tl.fromTo(
            "#b2-caption",
            { x: "-105%" },
            { x: "0%", duration: 0.65, ease: "power3.out" },
            1.2,
          );

          // Secondary chip fades up.
          tl.fromTo(
            "#b2-chip",
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
            3.0,
          );

          // One pulse of the winner-card ring once the camera has arrived.
          tl.fromTo(
            "#b2-ring",
            { opacity: 0, scale: 0.96 },
            { opacity: 1, scale: 1.0, duration: 0.55, ease: "power2.out" },
            7.0,
          );
          tl.to("#b2-ring", { opacity: 0.55, scale: 1.02, duration: 0.7, ease: "sine.inOut" }, 7.7);
          tl.to("#b2-ring", { opacity: 0.9, scale: 1.0, duration: 0.7, ease: "sine.inOut" }, 8.4);

          window.__timelines["b2-live-quotes"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
