<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #b4-bg {
          position: absolute;
          inset: 0;
          background: #1e2a12;
        }
        #b4-ring-deco {
          position: absolute;
          right: -220px;
          top: -260px;
          width: 900px;
          height: 900px;
          border-radius: 50%;
          border: 2px solid rgba(198, 232, 78, 0.18);
        }
        #b4-frame {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 1632px;
          height: 918px;
          margin-left: -816px;
          margin-top: -459px;
          border-radius: 18px;
          overflow: hidden;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }
        #b4-cam {
          position: absolute;
          inset: 0;
          transform-origin: 50% 72%;
        }
        .b4-shot {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        #b4-shot-chart {
          opacity: 0;
        }
        #b4-underline {
          position: absolute;
          left: 28.5%;
          top: 64.5%;
          width: 10.5%;
          height: 8px;
          border-radius: 4px;
          background: #c8f135;
          transform-origin: left center;
          opacity: 0;
        }
        #b4-caption-mask {
          position: absolute;
          left: 72px;
          bottom: 150px;
          overflow: hidden;
          border-radius: 14px;
        }
        #b4-caption {
          background: #f2f6e4;
          color: #1e2a12;
          font-size: 44px;
          font-weight: 700;
          letter-spacing: -0.01em;
          padding: 22px 36px;
          border-radius: 14px;
          box-shadow: 0 5px 0 #7ba428;
        }
        #b4-chip {
          position: absolute;
          left: 72px;
          bottom: 72px;
          background: #1e2a12;
          color: #c6e84e;
          border: 2px solid rgba(198, 232, 78, 0.4);
          font-size: 30px;
          font-weight: 600;
          padding: 14px 26px;
          border-radius: 14px;
          opacity: 0;
        }
      </style>

      <div id="root" data-composition-id="b4-provider" data-width="1920" data-height="1080" data-duration="11">
        <div id="b4-bg"></div>
        <div id="b4-ring-deco"></div>
        <div id="b4-frame">
          <div id="b4-cam">
            <img class="b4-shot" id="b4-shot-top" src="capture/screenshots/pages/provider-wise.png" alt="" />
            <img class="b4-shot" id="b4-shot-chart" src="capture/screenshots/pages/provider-wise-chart.png" alt="" />
            <div id="b4-underline"></div>
          </div>
        </div>
        <div id="b4-caption-mask"><div id="b4-caption">Rate history and provider reviews</div></div>
        <div id="b4-chip">Live EUR→PHP trend, 7D–1Y</div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Decorative ring drifts all beat.
          tl.fromTo("#b4-ring-deco", { x: 0, y: 0 }, { x: -50, y: 40, duration: 11, ease: "none" }, 0);

          // Frame enters.
          tl.fromTo(
            "#b4-frame",
            { opacity: 0, y: 48 },
            { opacity: 1, y: 0, duration: 0.85, ease: "power3.out" },
            0,
          );

          // Phase 1: gentle upward drift over the Wise header + quote.
          tl.fromTo("#b4-cam", { scale: 1.06, y: 0 }, { y: -24, duration: 4.6, ease: "power1.inOut" }, 0.4);

          // Caption.
          tl.fromTo(
            "#b4-caption",
            { x: "-105%" },
            { x: "0%", duration: 0.65, ease: "power3.out" },
            1.0,
          );

          // Phase 2: the page "scrolls" — crossfade to the chart view inside the same frame.
          tl.fromTo("#b4-shot-chart", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "power2.inOut" }, 5.0);

          // Camera dollies into the rate-history chart.
          tl.to("#b4-cam", { scale: 1.32, y: -10, duration: 4.2, ease: "power1.inOut" }, 5.4);

          // Chartreuse underline draws under the chart title.
          tl.fromTo(
            "#b4-underline",
            { opacity: 1, scaleX: 0 },
            { scaleX: 1, duration: 0.6, ease: "power3.out" },
            6.6,
          );

          // Chip.
          tl.fromTo(
            "#b4-chip",
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" },
            6.2,
          );

          window.__timelines["b4-provider"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
