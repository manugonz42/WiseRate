<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template>
      <style>
        #root {
          position: absolute;
          inset: 0;
          font-family: "Outfit", sans-serif;
          overflow: hidden;
        }
        #b5-bg {
          position: absolute;
          inset: 0;
          background: #f2f6e4;
        }
        #b5-blob {
          position: absolute;
          width: 1000px;
          height: 1000px;
          left: -380px;
          bottom: -480px;
          border-radius: 50%;
          background: radial-gradient(circle, #e7edd3 0%, rgba(231, 237, 211, 0) 70%);
        }
        #b5-frame {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 1574px;
          height: 900px;
          margin-left: -787px;
          margin-top: -450px;
          border-radius: 18px;
          overflow: hidden;
          background: #ffffff;
          box-shadow: 0 2px 0 rgba(30, 42, 18, 0.1), 0 24px 64px rgba(30, 42, 18, 0.18);
        }
        #b5-cam {
          position: absolute;
          inset: 0;
          transform-origin: 50% 18%;
        }
        #b5-shot {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        #b5-highlight {
          position: absolute;
          left: 33.2%;
          top: 20%;
          width: 33%;
          height: 7.5%;
          border-radius: 8px;
          background: rgba(200, 241, 53, 0.45);
          transform-origin: left center;
          opacity: 0;
        }
        #b5-url-chip {
          position: absolute;
          right: 72px;
          top: 72px;
          background: #ffffff;
          color: #1e2a12;
          font-size: 30px;
          font-weight: 600;
          padding: 14px 26px;
          border-radius: 14px;
          box-shadow: 0 4px 0 #7ba428;
          opacity: 0;
        }
        #b5-caption-mask {
          position: absolute;
          left: 72px;
          bottom: 96px;
          overflow: hidden;
          border-radius: 14px;
        }
        #b5-caption {
          background: #1e2a12;
          color: #f2f6e4;
          font-size: 42px;
          font-weight: 700;
          letter-spacing: -0.01em;
          padding: 22px 36px;
          border-radius: 14px;
          box-shadow: 0 5px 0 #7ba428;
        }
      </style>

      <div id="root" data-composition-id="b5-transparency" data-width="1920" data-height="1080" data-duration="10">
        <div id="b5-bg"></div>
        <div id="b5-blob"></div>
        <div id="b5-frame">
          <div id="b5-cam">
            <img id="b5-shot" src="capture/screenshots/pages/how-we-make-money.png" alt="" />
            <div id="b5-highlight"></div>
          </div>
        </div>
        <div id="b5-url-chip">app.sulitsend.com/how-we-make-money</div>
        <div id="b5-caption-mask">
          <div id="b5-caption">Fully transparent — commissions never affect rate or ranking</div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          const tl = gsap.timeline({ paused: true });

          // Ambient blob.
          tl.fromTo("#b5-blob", { x: 0, y: 0 }, { x: 60, y: -50, duration: 10, ease: "none" }, 0);

          // Frame enters.
          tl.fromTo(
            "#b5-frame",
            { opacity: 0, y: 48 },
            { opacity: 1, y: 0, duration: 0.85, ease: "power3.out" },
            0,
          );

          // Camera: zoomed on the page copy, slow pan down + micro dolly.
          tl.fromTo(
            "#b5-cam",
            { scale: 1.25, y: 0 },
            { scale: 1.3, y: -110, duration: 8.6, ease: "power1.inOut" },
            0.8,
          );

          // Marker-style highlight sweeps across the key sentence.
          tl.fromTo(
            "#b5-highlight",
            { opacity: 1, scaleX: 0 },
            { scaleX: 1, duration: 0.7, ease: "power2.out" },
            3.0,
          );

          // URL chip pops in.
          tl.fromTo(
            "#b5-url-chip",
            { opacity: 0, scale: 0.7 },
            { opacity: 1, scale: 1, duration: 0.6, ease: "back.out(1.6)" },
            2.0,
          );

          // Caption.
          tl.fromTo(
            "#b5-caption",
            { x: "-105%" },
            { x: "0%", duration: 0.65, ease: "power3.out" },
            1.0,
          );

          window.__timelines["b5-transparency"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
